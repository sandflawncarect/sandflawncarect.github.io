<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & F Lawn Care - Redirecting</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4f7f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #2e7d32; /* Grass green accent border */
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            color: #2e7d32;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background-color: #4caf50;
            color: white;
            padding: 14px 30px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn:hover {
            background-color: #388e3c;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .redirect-notice {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
    <script>
        // Redirect automatically after 5 seconds (5000 milliseconds)
        setTimeout(function(){
            window.location.href = "https://sites.google.com/view/s-and-f-lawncare/home";
        }, 5000);
    </script>
</head>
<body>

    <div class="container">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/14049734384857973866" alt="S & F Lawn Care Logo" class="logo">
        
        <h1>Welcome to S & F Lawn Care</h1>
        <p>Your lawn deserves the best. Click below to explore our services, view our gallery, and get a quote.</p>
        
        <a href="https://sites.google.com/view/s-and-f-lawncare/home" class="btn">Continue to Website</a>
        
        <p class="redirect-notice">You will be automatically redirected in 5 seconds.</p>
    </div>

</body>
</html>
